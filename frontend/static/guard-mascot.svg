<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 90" shape-rendering="crispEdges">

  <!-- ── Hat crown (cols 2-9, rows 0-2) ── -->
  <rect x="12" y="0"  width="48" height="18" fill="#1e3a8a"/>
  <!-- Hat badge: gold strip center of hat (cols 4-7, row 1) -->
  <rect x="24" y="6"  width="24" height="6"  fill="#fbbf24"/>
  <!-- Hat brim (cols 1-10, row 3) ── wider than crown -->
  <rect x="6"  y="18" width="60" height="6"  fill="#1e3a8a"/>

  <!-- ── Head ── -->
  <!-- Top of head (cols 2-9, row 4) -->
  <rect x="12" y="24" width="48" height="6"  fill="#fde68a"/>
  <!-- Wide head (cols 1-10, rows 5-7) -->
  <rect x="6"  y="30" width="60" height="18" fill="#fde68a"/>
  <!-- Eyes (row 6): left col 3, right col 8 -->
  <rect x="18" y="36" width="6"  height="6"  fill="#111827"/>
  <rect x="48" y="36" width="6"  height="6"  fill="#111827"/>
  <!-- Eye shine -->
  <rect x="24" y="36" width="6"  height="6"  fill="#ffffff"/>
  <rect x="54" y="36" width="6"  height="6"  fill="#ffffff"/>
  <!-- Rosy cheeks (row 7): cols 1-2 and cols 9-10 -->
  <rect x="6"  y="42" width="12" height="6"  fill="#fca5a5"/>
  <rect x="54" y="42" width="12" height="6"  fill="#fca5a5"/>
  <!-- Smile row (row 8): skin background + black smile cols 4-7 -->
  <rect x="6"  y="48" width="60" height="6"  fill="#fde68a"/>
  <rect x="24" y="48" width="24" height="6"  fill="#111827"/>
  <!-- Chin (cols 2-9, row 9) -->
  <rect x="12" y="54" width="48" height="6"  fill="#fde68a"/>

  <!-- ── Fat body (full 12-col width = wider than head) ── -->
  <!-- Shoulders row (row 10): navy body + skin hands at edges -->
  <rect x="0"  y="60" width="72" height="6"  fill="#1e3a8a"/>
  <rect x="0"  y="60" width="6"  height="6"  fill="#fde68a"/>
  <rect x="66" y="60" width="6"  height="6"  fill="#fde68a"/>
  <!-- Chest row (row 11): navy + gold badge center (cols 4-7) -->
  <rect x="0"  y="66" width="72" height="6"  fill="#1e3a8a"/>
  <rect x="24" y="66" width="24" height="6"  fill="#fbbf24"/>
  <!-- Belt row (row 12): brown + gold buckle center -->
  <rect x="0"  y="72" width="72" height="6"  fill="#78350f"/>
  <rect x="30" y="72" width="12" height="6"  fill="#fbbf24"/>
  <!-- Lower body (row 13) -->
  <rect x="0"  y="78" width="72" height="6"  fill="#1e3a8a"/>

  <!-- ── Stubby legs (row 14) ── -->
  <rect x="12" y="84" width="18" height="6"  fill="#1e3a8a"/>
  <rect x="42" y="84" width="18" height="6"  fill="#1e3a8a"/>

</svg>
